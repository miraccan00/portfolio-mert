<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Portfolio — Mirac</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: #111118;
        color: #e8e4dc;
        font-family: 'Inter', sans-serif;
        min-height: 100vh;
        overflow-x: hidden;
      }

      .container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 32px 24px;
      }

      /* ======= VIEWER ======= */
      #viewer {
        position: relative;
        width: 100%;
        aspect-ratio: 16 / 9;
        background: #0a0a12;
        border-radius: 16px;
        border: 1px solid rgba(255,255,255,0.06);
        overflow: hidden;
        margin-bottom: 24px;
      }

      #viewer canvas {
        width: 100% !important;
        height: 100% !important;
        display: block;
      }

      /* Viewer info (alt kisim) */
      #viewer-info {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 20px 24px;
        background: linear-gradient(transparent, rgba(0,0,0,0.7));
        pointer-events: none;
      }
      #viewer-title {
        font-size: 24px;
        font-weight: 500;
        margin-bottom: 4px;
      }
      #viewer-tags {
        font-family: 'DM Mono', monospace;
        font-size: 12px;
        color: rgba(255,255,255,0.45);
        letter-spacing: 0.02em;
      }

      /* Toolbar (viewer icinde ust kisim) */
      #toolbar {
        position: absolute;
        top: 16px;
        right: 16px;
        display: flex;
        gap: 8px;
        z-index: 5;
      }

      .tool-btn {
        background: rgba(0,0,0,0.4);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255,255,255,0.15);
        color: rgba(255,255,255,0.7);
        padding: 8px 18px;
        border-radius: 999px;
        font-family: 'Inter', sans-serif;
        font-size: 13px;
        font-weight: 400;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .tool-btn:hover {
        background: rgba(255,255,255,0.08);
        border-color: rgba(255,255,255,0.3);
        color: #fff;
      }
      .tool-btn.active {
        background: rgba(255,255,255,0.14);
        border-color: rgba(255,255,255,0.4);
        color: #fff;
      }

      /* Loading spinner */
      #loader {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'DM Mono', monospace;
        font-size: 12px;
        color: rgba(255,255,255,0.3);
        letter-spacing: 0.1em;
        z-index: 4;
        background: #0a0a12;
        transition: opacity 0.4s ease;
      }
      #loader.hidden {
        opacity: 0;
        pointer-events: none;
      }

      /* ======= MODEL GRID ======= */
      #model-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 16px;
      }

      .model-card {
        position: relative;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.06);
        overflow: hidden;
        cursor: pointer;
        transition: all 0.25s ease;
        background: #15151e;
      }
      .model-card:hover {
        border-color: rgba(255,255,255,0.15);
        transform: translateY(-2px);
      }
      .model-card.active {
        border-color: rgba(74,127,232,0.5);
        box-shadow: 0 0 0 1px rgba(74,127,232,0.3);
      }

      .card-preview {
        width: 100%;
        aspect-ratio: 4 / 3;
        background: #0d0d16;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card-preview canvas {
        width: 100% !important;
        height: 100% !important;
      }

      .card-info {
        padding: 14px 16px;
      }
      .card-title {
        font-size: 14px;
        font-weight: 500;
        margin-bottom: 4px;
      }
      .card-tags {
        font-family: 'DM Mono', monospace;
        font-size: 11px;
        color: rgba(255,255,255,0.35);
      }

      /* ======= RESPONSIVE ======= */
      @media (max-width: 768px) {
        .container { padding: 16px 12px; }

        #viewer { aspect-ratio: 4 / 3; border-radius: 12px; }

        #viewer-title { font-size: 18px; }

        #toolbar { top: 10px; right: 10px; gap: 6px; }
        .tool-btn { padding: 6px 12px; font-size: 11px; }

        #model-grid {
          grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
          gap: 10px;
        }
        .card-info { padding: 10px 12px; }
        .card-title { font-size: 13px; }
      }

      @media (max-width: 480px) {
        #model-grid {
          grid-template-columns: 1fr 1fr;
          gap: 8px;
        }
        #toolbar {
          flex-wrap: wrap;
          justify-content: flex-end;
        }
      }
    </style>
    <script type="module" crossorigin src="/portfolio-mert/assets/index-cW0lXQup.js"></script>
  </head>
  <body>
    <div class="container">
      <div id="viewer">
        <div id="loader">loading...</div>
        <div id="toolbar">
          <button class="tool-btn" id="btn-rotate">Auto-rotate</button>
          <button class="tool-btn" id="btn-wireframe">Wireframe</button>
        </div>
        <div id="viewer-info">
          <div id="viewer-title"></div>
          <div id="viewer-tags"></div>
        </div>
      </div>

      <div id="model-grid"></div>
    </div>

  </body>
</html>
